name: Export Posts as PDF

on:
  workflow_dispatch:
    inputs:
      export_mode:
        description: "Export-Modus"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - single
      post_identifier:
        description: "Bei single: Slug oder Dateiname (z. B. willkommen-im-neuen-tech-blog oder 2026-02-20-willkommen-im-blog.md)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf

      - name: Export markdown posts to PDF
        shell: bash
        env:
          EXPORT_MODE: ${{ inputs.export_mode }}
          POST_IDENTIFIER: ${{ inputs.post_identifier }}
        run: |
          set -euo pipefail
          mkdir -p dist/pdf

          shopt -s nullglob

          files=()
          mode="${EXPORT_MODE:-all}"
          identifier="${POST_IDENTIFIER:-}"

          if [ "$mode" = "single" ]; then
            if [ -z "$identifier" ]; then
              echo "Bitte post_identifier setzen, wenn export_mode=single."
              exit 1
            fi

            if [[ "$identifier" == *.md ]]; then
              if [ -f "_posts/$identifier" ]; then
                files=("_posts/$identifier")
              fi
            else
              if [ -f "_posts/${identifier}.md" ]; then
                files=("_posts/${identifier}.md")
              else
                matches=("_posts"/*-"$identifier".md)
                if [ ${#matches[@]} -gt 0 ]; then
                  files=("${matches[0]}")
                fi
              fi
            fi

            if [ ${#files[@]} -eq 0 ]; then
              echo "Kein Post für post_identifier='$identifier' gefunden."
              echo "Erwartet: Slug oder Dateiname in _posts/."
              exit 1
            fi
          else
            files=("_posts"/*.md)
          fi

          if [ ${#files[@]} -eq 0 ]; then
            echo "Keine Posts in _posts gefunden."
            exit 1
          fi

          for file in "${files[@]}"; do
            base=$(basename "$file" .md)
            slug=$(echo "$base" | sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}-//')
            output="dist/pdf/${slug}.pdf"

            pandoc "$file" \
              --from=gfm \
              --to=html5 \
              --standalone \
              --pdf-engine=wkhtmltopdf \
              --highlight-style=breezedark \
              --metadata title="$slug" \
              -V lang=de \
              -o "$output"
          done

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: blog-pdf-export
          path: dist/pdf/*.pdf
          if-no-files-found: error
