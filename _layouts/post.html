---
layout: default
---

<article class="post">
    <header class="post-header">
        <h1>{{ page.title }}</h1>
        <p class="post-meta">
            <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d.%m.%Y" }}</time>
            {% if page.categories and page.categories.size > 0 %}
            ·
            {% for cat in page.categories %}
            <a class="tag" href="{{ '/categories/#' | append: cat | slugify | relative_url }}">#{{ cat }}</a>{% unless
            forloop.last %} {% endunless %}
            {% endfor %}
            {% endif %}
        </p>
    </header>

    <section class="post-content">
        {{ content }}
    </section>
</article>
