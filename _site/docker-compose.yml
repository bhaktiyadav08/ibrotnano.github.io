services:
  jekyll:
    image: jekyll/jekyll:pages
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    command: >
      bash -lc "bundle install && bundle exec jekyll serve
      --host 0.0.0.0
      --livereload
      --drafts
      --force_polling"

volumes:
  bundle_cache: