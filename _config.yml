title: Code & Notes
description: Technischer Blog mit Fokus auf Code, Architektur und Diagramme.
url: ""
baseurl: ""
timezone: Europe/Berlin
lang: de
author: Dein Name

twitter:
  username: ""
  card: summary_large_image

social:
  name: Code & Notes
  links: []

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

permalink: /:categories/:year/:month/:day/:title/

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: default

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
